<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio #19: Salidas con JavaScript</title>
</head>
<body>

    <h2>Salidas con JavaScript</h2>

    <p id="parrafo"></p>

    <script>
        // innerHTML
        document.getElementById("parrafo").innerHTML = "Nombre: Cota Borboa";

        // document.write
        document.write("<p>Edad: 20 años</p>");
        document.write("<p>Carrera: Ingeniería en Informática</p>");

        // window.alert
        window.alert("Correo: borboa@ejemplo.com");

        // console.log
        console.log("Teléfono: 667-123-4567");
    </script>

</body>
</html>
