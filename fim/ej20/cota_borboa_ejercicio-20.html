<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio #20: Impresión de operaciones</title>
</head>
<body>

    <h2>Impresión de operaciones</h2>

    <script>
        var a = 10;
        var b = 4;

        document.write("<p>Valor de a: " + a + "</p>");
        document.write("<p>Valor de b: " + b + "</p>");
        document.write("<p>Suma: " + (a + b) + "</p>");
        document.write("<p>Resta: " + (a - b) + "</p>");
        document.write("<p>División: " + (a / b) + "</p>");
        document.write("<p>Exponenciación: " + (a ** b) + "</p>");
    </script>

</body>
</html>
